name: nexchat

services:
  auth:
    build:
      context: ./backend/auth
    container_name: nexchat_auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - DATABASE_URL=${AUTH_DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.runner.asgi:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend/auth/app:/app/app
    ports:
      - "8000:8000"
    networks:
      - nexchat

  chat:
    build:
      context: ./backend/chat
    container_name: nexchat_chat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - DATABASE_URL=${CHAT_DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.runner.asgi:app --host 0.0.0.0 --port 8001 --reload"
    volumes:
      - ./backend/chat/app:/app/app
    ports:
      - "8001:8001"
    networks:
      - nexchat

  postgres:
    image: postgres:16-alpine
    container_name: nexchat_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - nexchat

  redis:
    image: redis:7-alpine
    container_name: nexchat_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"
    networks:
      - nexchat

volumes:
  postgres_data:

networks:
  nexchat:
    driver: bridge
