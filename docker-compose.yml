name: nexchat

services:
  auth:
    build:
      context: ./backend/auth
    container_name: nexchat_auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - DATABASE_URL=${AUTH_DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - EMAIL_VERIFY_URL_BASE=${EMAIL_VERIFY_URL_BASE:-http://localhost:5173/verify-email}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.runner.asgi:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend/auth/app:/app/app
    ports:
      - "8000:8000"
    networks:
      - nexchat

  chat:
    build:
      context: ./backend/chat
    container_name: nexchat_chat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - DATABASE_URL=${CHAT_DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.runner.asgi:app --host 0.0.0.0 --port 8001 --reload"
    volumes:
      - ./backend/chat/app:/app/app
    ports:
      - "8001:8001"
    networks:
      - nexchat

  notifications:
    build:
      context: ./backend/notifications
    container_name: nexchat_notifications
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - DATABASE_URL=${NOTIFICATIONS_DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SERVICE_TOKEN=${NOTIFICATIONS_SERVICE_TOKEN}
      - FCM_CREDENTIALS_FILE=/app/secrets/serviceAccountKey.json
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.runner.asgi:app --host 0.0.0.0 --port 8002 --reload"
    volumes:
      - ./backend/notifications/app:/app/app
      - ./backend/notifications/secrets:/app/secrets:ro
    ports:
      - "8002:8002"
    networks:
      - nexchat

  gateway:
    image: node:20-alpine
    container_name: nexchat_gateway
    working_dir: /app
    depends_on:
      - auth
      - chat
      - notifications
    environment:
      - AUTH_PROXY_TARGET=http://auth:8000
      - CHAT_PROXY_TARGET=http://chat:8001
      - CHAT_WS_TARGET=ws://chat:8001
      - NOTIFICATIONS_PROXY_TARGET=http://notifications:8002
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET:-}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID:-}
      - VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY:-}
      - VITE_USE_POLLING=1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - nexchat

  loki:
    image: grafana/loki:3.0.0
    container_name: nexchat_loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - nexchat

  promtail:
    image: grafana/promtail:3.0.0
    container_name: nexchat_promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nexchat

  grafana:
    image: grafana/grafana:11.1.0
    container_name: nexchat_grafana
    depends_on:
      - loki
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
    ports:
      - "3000:3000"
    networks:
      - nexchat

  postgres:
    image: postgres:16-alpine
    container_name: nexchat_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - nexchat

  redis:
    image: redis:7-alpine
    container_name: nexchat_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"
    networks:
      - nexchat

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexchat_rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - nexchat

volumes:
  postgres_data:
  rabbitmq_data:
  loki_data:
  grafana_data:

networks:
  nexchat:
    driver: bridge
