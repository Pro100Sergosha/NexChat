name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, chat]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        service: [auth, chat]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexchat
          POSTGRES_PASSWORD: nexchat
          POSTGRES_DB: ${{ matrix.service }}_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://nexchat:nexchat@localhost:5432/${{ matrix.service }}_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80 -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/coverage.xml

  migrate:
    name: Migrations (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        service: [auth, chat]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexchat
          POSTGRES_PASSWORD: nexchat
          POSTGRES_DB: ${{ matrix.service }}_migrate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://nexchat:nexchat@localhost:5432/${{ matrix.service }}_migrate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Migrate up (upgrade head)
        run: uv run alembic upgrade head

      - name: Migrate down (downgrade base)
        run: uv run alembic downgrade base

      - name: Migrate up again (verify idempotency)
        run: uv run alembic upgrade head

  build:
    name: Build Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: migrate
    strategy:
      fail-fast: false
      matrix:
        service: [auth, chat]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: backend/${{ matrix.service }}
          push: false
          tags: nexchat-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
