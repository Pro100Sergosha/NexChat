name: Auto PR to main

on:
  push:
    branches:
      - "**"
      - "!main"

jobs:
  create-pr:
    name: Create PR → main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq length)

          if [ "$EXISTING" -eq 0 ]; then
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "merge $BRANCH to main" \
              --body "Auto-created PR from branch \`$BRANCH\`"
            echo "PR created: $BRANCH → main"
          else
            echo "PR already exists, skipping"
          fi
