name: Auto PR to main

on:
  push:
    branches:
      - "**"
      - "!main"

jobs:
  create-pr:
    name: Create PR → main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq length)

          if [ "$EXISTING" -eq 0 ]; then
            COMMITS=$(git log origin/main..HEAD --pretty=format:"- %s (%h)" 2>/dev/null || git log HEAD~5..HEAD --pretty=format:"- %s (%h)")

            BODY="## Commits ${COMMITS}"

            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "merge $BRANCH to main" \
              --body "$BODY"
            echo "PR created: $BRANCH → main"
          else
            echo "PR already exists, skipping"
          fi
