# NexChat gateway — serves the static frontend and reverse-proxies the two
# backend services on the same origin (so the browser never hits CORS).
#
#   /api/auth/*  -> auth:8000  (prefix stripped)
#   /api/chat/*  -> chat:8001  (prefix stripped)
#   /ws          -> chat:8001  (WebSocket upgrade)
#   /*           -> static SPA (index.html fallback)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Auth service ---------------------------------------------------
    # Trailing slash on proxy_pass strips the /api/auth prefix:
    #   /api/auth/login -> auth:8000/login
    location /api/auth/ {
        proxy_pass http://auth:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Chat service (HTTP) --------------------------------------------
    location /api/chat/ {
        proxy_pass http://chat:8001/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Chat service (WebSocket) ---------------------------------------
    # No prefix strip; ?token=<jwt> query is forwarded as-is.
    location /ws {
        proxy_pass http://chat:8001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Static SPA ------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
